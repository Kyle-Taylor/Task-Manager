spring.config.import=optional:file:../.env[.properties]
spring.application.name=${PROFILE_SERVICE_NAME:profile-service}
server.port=${PROFILE_SERVICE_PORT:8082}

spring.datasource.url=${PROFILE_DB_URL:jdbc:mysql://localhost:3306/profile_service?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${PROFILE_DB_USERNAME:root}
spring.datasource.password=${PROFILE_DB_PASSWORD:password}

spring.output.ansi.enabled=always

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
