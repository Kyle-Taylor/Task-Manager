spring.config.import=optional:file:../.env[.properties]
spring.application.name=${TASK_SERVICE_NAME:task-service}
server.port=${TASK_SERVICE_PORT:8083}

spring.datasource.url=${TASK_DB_URL:jdbc:mysql://localhost:3306/task_manager?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${TASK_DB_USERNAME:root}
spring.datasource.password=${TASK_DB_PASSWORD:password}

spring.output.ansi.enabled=always

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

profile.service.base-url=${PROFILE_SERVICE_BASE_URL:http://localhost:8082}
