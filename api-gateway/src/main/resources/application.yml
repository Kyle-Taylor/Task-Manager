spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: ${API_GATEWAY_NAME:api-gateway}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true          # Auto-discovers services from Eureka
          lower-case-service-id: true  # Allows lowercase route paths

server:
  port: ${API_GATEWAY_PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
